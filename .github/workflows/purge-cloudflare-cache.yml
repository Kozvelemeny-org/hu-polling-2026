name: Purge Cloudflare cache after Pages deploy

on:
  workflow_run:
    workflows: ["Cloudflare Pages"]
    types:
      - completed

jobs:
  purge-cache:
    if: >
      github.repository == 'hidegmisi/hu-polling-copy-vercel' &&
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Purge Cloudflare cache
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
        run: |
          curl --fail -X POST "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/purge_cache" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'

